<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPC超级个体训练营｜展示浏览器</title>
    <style>
      :root{color-scheme:dark;--bg:#080a12;--panel:#121725;--line:rgba(255,255,255,.12);--text:#f7f8ff;--muted:#9099ad;--purple:#7a5cff;--cyan:#29e7ff;--green:#36d399}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 18% 10%,rgba(122,92,255,.2),transparent 32%),radial-gradient(circle at 90% 14%,rgba(41,231,255,.12),transparent 30%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.shell{width:min(1220px,calc(100% - 36px));margin:auto;padding:38px 0 60px}.top{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:34px}.brand{display:flex;align-items:center;gap:12px}.mark{display:grid;place-items:center;width:48px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--purple),#141826);box-shadow:0 14px 36px rgba(122,92,255,.25);font-weight:900}.brand strong{display:block;font-size:18px}.brand small{display:block;color:var(--muted);font-size:10px;letter-spacing:.12em}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.05);color:var(--text);padding:0 14px;text-decoration:none;font-weight:800;font-size:13px}.btn.primary{background:linear-gradient(135deg,#7658ff,#665fff);border-color:#9d87ff}.hero{display:grid;grid-template-columns:minmax(0,.84fr) minmax(0,1.16fr);align-items:center;gap:42px}.pill{display:inline-flex;align-items:center;gap:8px;min-height:34px;border:1px solid rgba(41,231,255,.2);border-radius:999px;background:rgba(41,231,255,.06);color:#b9f6ff;padding:0 12px;font-size:11px;font-weight:900;letter-spacing:.08em}.pill i{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 14px var(--green)}h1{margin:20px 0 18px;font-size:clamp(38px,5vw,66px);line-height:1.06;letter-spacing:-.055em}.grad{background:linear-gradient(110deg,#fff,#b9adff 48%,#68efff);-webkit-background-clip:text;background-clip:text;color:transparent}.lead{color:#c5ccda;font-size:16px;line-height:1.82}.roles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:26px}.role{border:1px solid var(--line);border-radius:18px;background:rgba(18,23,37,.86);padding:18px}.role span{display:grid;place-items:center;width:34px;height:34px;margin-bottom:16px;border-radius:10px;background:rgba(122,92,255,.16);color:#c8bdff;font-weight:900}.role:nth-child(2) span{background:rgba(41,231,255,.12);color:#adf7ff}.role:nth-child(3) span{background:rgba(54,211,153,.12);color:#a8efce}.role strong{display:block;margin-bottom:8px}.role p{margin:0;color:var(--muted);font-size:12px;line-height:1.65}.browser{overflow:hidden;border:1px solid rgba(255,255,255,.16);border-radius:24px;background:#0b0e15;box-shadow:0 34px 90px rgba(0,0,0,.38)}.bar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;min-height:48px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.045);padding:0 14px}.dots{display:flex;gap:6px}.dots i{width:10px;height:10px;border-radius:50%;background:#fff}.dots i:nth-child(1){background:#ff6d72}.dots i:nth-child(2){background:#ffc85b}.dots i:nth-child(3){background:#52d88c}.address{overflow:hidden;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(0,0,0,.2);color:#8e97ab;padding:7px 12px;font-size:12px;white-space:nowrap;text-overflow:ellipsis}.status{display:flex;align-items:center;gap:7px;color:#acebcf;font-size:11px;font-weight:800}.status i{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green)}.viewport{background:#090b10;padding:18px}.viewport iframe{display:block;width:100%;height:690px;border:0;border-radius:16px;background:#0c0e14}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;border:1px solid var(--line);border-radius:18px;background:rgba(18,23,37,.86);padding:14px}.seg{display:flex;gap:6px;border:1px solid var(--line);border-radius:14px;background:rgba(0,0,0,.2);padding:5px}.seg button{min-height:34px;border:0;border-radius:10px;background:transparent;color:var(--muted);padding:0 12px;font-weight:900;cursor:pointer}.seg button.active{background:var(--purple);color:white}.hint{margin:0;color:var(--muted);font-size:12px}.browser.mobile .viewport{min-height:760px;display:grid;place-items:center}.browser.mobile iframe{width:390px;max-width:100%;height:720px;border-radius:32px;box-shadow:0 0 0 10px #11141d,0 0 0 11px rgba(255,255,255,.12)}@media(max-width:980px){.hero{grid-template-columns:1fr}.roles{grid-template-columns:1fr}.bar{grid-template-columns:auto 1fr}.status{display:none}}@media(max-width:640px){.top{align-items:flex-start;flex-direction:column}h1{font-size:36px}.browser.mobile iframe{width:360px;height:610px}.viewport iframe{height:640px}}
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="top">
        <a class="brand" href="index.html"><span class="mark">OPC</span><span><strong>OPC超级个体训练营</strong><small>GITHUB PAGES SHOWCASE</small></span></a>
        <div class="actions"><a class="btn" href="index.html" target="_blank" rel="noopener">打开正式页面</a><a class="btn primary" href="README.md" target="_blank" rel="noopener">上线说明</a></div>
      </header>
      <main class="hero">
        <section>
          <div class="pill"><i></i> 登录 / 注册 / 权限演示</div>
          <h1>先用 GitHub 上线的<span class="grad">浏览器展示页</span></h1>
          <p class="lead">当前版本可直接部署到 GitHub Pages。展示页中内嵌正式入口，可测试用户登录、管理员登录和注册申请。</p>
          <div class="roles">
            <article class="role"><span>用</span><strong>用户登录</strong><p>查看素材、搜索筛选、打开素材文件。</p></article>
            <article class="role"><span>管</span><strong>管理员登录</strong><p>查看、上传、删除素材、查看注册申请。</p></article>
            <article class="role"><span>注</span><strong>注册申请</strong><p>填写姓名、联系方式、申请权限和说明。</p></article>
          </div>
        </section>
        <section>
          <div class="browser" id="browserFrame">
            <div class="bar"><div class="dots"><i></i><i></i><i></i></div><div class="address" id="addressText">github.io/opc-camp/index.html</div><div class="status"><i></i> 预览就绪</div></div>
            <div class="viewport"><iframe title="OPC训练营页面预览" src="index.html"></iframe></div>
          </div>
          <div class="toolbar"><div class="seg"><button class="active" data-device="desktop" type="button">桌面</button><button data-device="mobile" type="button">手机</button></div><p class="hint">演示卡密：用户 OPC-VIEW-2026；管理员 OPC-EDIT-2026</p></div>
        </section>
      </main>
    </div>
    <script>
      const frame=document.querySelector('#browserFrame');const addr=document.querySelector('#addressText');
      document.querySelectorAll('[data-device]').forEach(btn=>btn.addEventListener('click',()=>{const mobile=btn.dataset.device==='mobile';document.querySelectorAll('[data-device]').forEach(x=>x.classList.toggle('active',x===btn));frame.classList.toggle('mobile',mobile);addr.textContent=mobile?'github.io/opc-camp/mobile-preview':'github.io/opc-camp/index.html'}));
    </script>
  </body>
</html>
